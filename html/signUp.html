<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div id="nav-placeholder"></div>
    </header>

    <main class="container signup-container">

    <div class="signup-intro">
        <h2>👤 회원가입</h2>
        <p>SKALA-FRONT 회원가입을 환영합니다.</p>
    </div>

    <form action="signUpResult.html" method="get" class="signup-form">

        <fieldset>
            <legend>계정 정보</legend>

            <div class="form-row">
                <label for="userId">아이디</label>
                <div class="form-control">
                    <input type="text" id="userId" name="userId" minlength="4" maxlength="15" required placeholder="4~15자 영문/숫자">
                    <small>필수 · 4~15자</small>
                </div>
            </div>

            <div class="form-row">
                <label for="userPw">비밀번호</label>
                <div class="form-control">
                    <input type="password" id="userPw" name="userPw" minlength="8" required placeholder="8자 이상 입력">
                    <small>필수 · 8자 이상</small>
                </div>
            </div>

            <div class="form-row">
                <label for="userEmail">이메일</label>
                <div class="form-control">
                    <div class="input-group">
                        <input type="text" id="userEmail" name="userEmail" placeholder="example">
                        <span class="input-group-at">@</span>
                        <select name="emailDomain">
                            <option value="direct">직접 입력</option>
                            <option value="naver.com">naver.com</option>
                            <option value="gmail.com">gmail.com</option>
                            <option value="daum.net">daum.net</option>
                        </select>
                    </div>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>개인 프로필 정보</legend>

            <div class="form-row">
                <label for="userName">이름</label>
                <div class="form-control">
                    <input type="text" id="userName" name="userName" required>
                </div>
            </div>

            <div class="form-row">
                <label for="userBirth">생년월일</label>
                <div class="form-control">
                    <input type="date" id="userBirth" name="userBirth">
                </div>
            </div>

            <div class="form-row">
                <span class="form-row-label">성별</span>
                <div class="form-control">
                    <div class="choice-group" role="radiogroup" aria-label="성별">
                        <label class="choice-pill"><input type="radio" name="gender" value="male" checked> 남성</label>
                        <label class="choice-pill"><input type="radio" name="gender" value="female"> 여성</label>
                        <label class="choice-pill"><input type="radio" name="gender" value="none"> 선택안함</label>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <span class="form-row-label">관심 분야</span>
                <div class="form-control">
                    <div class="choice-group" role="group" aria-label="관심 분야 (중복 선택 가능)">
                        <label class="choice-pill"><input type="checkbox" name="interest" value="frontend"> 웹 프론트엔드 (Vue.js/HTML)</label>
                        <label class="choice-pill"><input type="checkbox" name="interest" value="uiux"> UI/UX 디자인 표준</label>
                        <label class="choice-pill"><input type="checkbox" name="interest" value="backend"> 백엔드 & 데이터베이스</label>
                        <label class="choice-pill"><input type="checkbox" name="interest" value="devops"> 클라우드 & 인프라</label>
                    </div>
                    <small>중복 선택 가능</small>
                </div>
            </div>

            <div class="form-row">
                <label for="joinPath">가입 경로</label>
                <div class="form-control">
                    <select id="joinPath" name="joinPath">
                        <option value="" disabled selected>-- 선택해 주세요 --</option>
                        <option value="search">인터넷 검색</option>
                        <option value="friend">지인 추천</option>
                        <option value="sns">SNS 광고</option>
                        <option value="etc">기타</option>
                    </select>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>자기소개</legend>
            <div class="form-row form-row--stacked">
                <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사</label>
                <div class="form-control">
                    <textarea id="intro" name="intro" rows="5" cols="50" maxlength="200" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
                </div>
            </div>
        </fieldset>

        <div class="signup-actions">
            <input type="submit" class="btn-submit" value="동의하고 회원가입">
            <input type="reset" class="btn-reset" value="다시 작성">
        </div>

    </form>

    </main>

    <div id="footer-placeholder"></div>

    <script src="../script/nav.js"></script>
    <script src="../script/footer.js"></script>
</body>
</html>
