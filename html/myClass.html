<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주별 수업 시간표 - Som's Universe</title>
    <meta name="description" content="소미의 2026년 하반기 훈련 과정을 월~토 주간 시간대별 그리드로 보여주는 주별 시간표입니다.">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header>
        <div id="nav-placeholder"></div>
    </header>

    <main class="calendar-layout">
        <aside class="calendar-sidebar" aria-label="캘린더 사이드바">
            <time class="sidebar-date" id="sidebar-date">
                <span class="sidebar-date__day" id="sidebar-today-day">16</span>
                <span class="sidebar-date__month" id="sidebar-today-month">July 2026</span>
            </time>
            <nav aria-label="캘린더 보기 전환" class="calendar-subnav">
                <a href="myClass.html" class="btn-pill" aria-current="page">📖 주별</a>
                <a href="myMonthlyClass.html" class="btn-pill">🗓️ 월별</a>
                <a href="myHoliday.html" class="btn-pill">🎉 휴일</a>
            </nav>
        </aside>

        <section id="week-section" aria-labelledby="week-title">
            <h1 id="week-title">📖 My Weekly Class</h1>

            <div class="week-nav" aria-label="주 이동">
                <button type="button" id="prev-week-btn" class="carousel-btn" aria-label="이전 주로 이동">←</button>
                <strong id="current-week-display">주 정보를 불러오는 중...</strong>
                <button type="button" id="next-week-btn" class="carousel-btn" aria-label="다음 주로 이동">→</button>
            </div>

            <div id="week-grid" class="week-grid" role="grid" aria-label="주간 수업 시간표"></div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../script/calendarUtils.js"></script>
    <script src="../script/weekView.js"></script>
    <script src="../script/sidebarDate.js"></script>
    <script src="../script/nav.js"></script>
    <script src="../script/footer.js"></script>
</body>
</html>
