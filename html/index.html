<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Som's Universe - 소미의 디지털 홈</title>
    <meta
      name="description"
      content="소미의 일상, 여행, 프로젝트가 생동감 있게 펼쳐지는 기발한 세계, Som's Universe에 오신 것을 환영합니다."
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>

    <!-- 1. 헤더 영역: 글로벌 네비게이션 -->
    <header>
      <div id="nav-placeholder"></div>
    </header>

    <!-- 2. 메인 콘텐츠 영역 -->
    <main class="home-main">
      <!-- 히어로 섹션 -->
      <section class="hero" aria-labelledby="hero-title">
        <h1 id="hero-title">Som's Universe</h1>
        <p>
          The whimsical world where Som's life, travels, and projects come
          alive.
        </p>
        <a href="#portraits" class="btn-pill hero-cta">
          <span>Let's Explore!</span>
          <span class="btn-arrow" aria-hidden="true">&rarr;</span>
        </a>
      </section>

      <!-- 메뉴 바로가기 섹션: 5개 주요 카테고리로 이동하는 아이콘 링크 -->
      <section
        class="portraits"
        id="portraits"
        aria-label="주요 메뉴 바로가기"
      >
        <ul class="portrait-grid">
          <li>
            <a
              href="myProfile.html"
              class="portrait-card brutal-box"
              aria-label="프로필 소개 페이지로 이동"
            >
              <img src="../media/profile_icon.png" alt="프로필 소개" />
            </a>
          </li>
          <li>
            <a
              href="myClass.html"
              class="portrait-card brutal-box"
              aria-label="라이프 캘린더 페이지로 이동"
            >
              <img src="../media/calendar_icon.png" alt="라이프 캘린더" />
            </a>
          </li>
          <li>
            <a
              href="myTrip.html"
              class="portrait-card brutal-box"
              aria-label="여행 기록 페이지로 이동"
            >
              <img src="../media/trip_icon.png" alt="여행 기록" />
            </a>
          </li>
          <li>
            <a
              href="jsPlayground.html"
              class="portrait-card brutal-box"
              aria-label="JS 플레이그라운드 페이지로 이동"
            >
              <img src="../media/playground_icon.png" alt="JS 플레이그라운드" />
            </a>
          </li>
          <li>
            <a
              href="signUp.html"
              class="portrait-card brutal-box"
              aria-label="멤버십 가입 페이지로 이동"
            >
              <img src="../media/signup_icon.png" alt="멤버십 가입" />
            </a>
          </li>
          <li>
            <button
              type="button"
              class="portrait-card brutal-box"
              id="weather-trigger"
              aria-haspopup="dialog"
              aria-controls="weather-dialog"
              aria-label="실시간 날씨 도시 선택"
            >
              <img src="../media/city_weather.png" alt="실시간 날씨" />
            </button>
          </li>
        </ul>
      </section>

      <!-- 실시간 날씨 도시 선택 다이얼로그 -->
      <dialog id="weather-dialog" aria-labelledby="weather-dialog-title">
        <button type="button" class="dialog-close" aria-label="닫기">&times;</button>
        <h2 id="weather-dialog-title">🌍 도시별 실시간 날씨</h2>
        <p>도시를 선택하면 실시간 기온/습도/풍속을 알려드려요.</p>

        <div class="playground-form-row">
          <label for="weather-city-select">도시 선택</label>
          <select id="weather-city-select"></select>
        </div>

        <div id="weather-box" role="status" aria-live="polite">
          <p>도시를 선택하면 실시간 날씨를 보여드릴게요! 🌤️</p>
        </div>
      </dialog>
    </main>

    <!-- 상태 표시바: 사이드바 성격의 부가 정보 제공 -->
    <aside class="status-bar" aria-label="현재 접속 정보">
      <p>
        오늘 날짜: 2026년 7월 15일 | 현재 위치: 광주광역시 광산구 | 시간: 오후
        8:30
      </p>
    </aside>

    <!-- 3. 푸터 영역 -->
    <div id="footer-placeholder"></div>

    <script src="../script/nav.js"></script>
    <script src="../script/footer.js"></script>
    <script src="../script/statusBarTicker.js"></script>
    <script type="module" src="../script/realtimeInfo.js"></script>
  </body>
</html>
