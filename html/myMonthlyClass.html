<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월별 학사일정 - Som's Universe</title>
    <meta name="description" content="소미의 2026년 하반기 훈련 과정을 월 단위 달력 그리드로 보여주는 월별 학사일정입니다.">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <header>
        <div id="nav-placeholder"></div>
    </header>

    <main class="calendar-layout">
        <aside class="calendar-sidebar" aria-label="캘린더 사이드바">
            <time class="sidebar-date" id="sidebar-date">
                <span class="sidebar-date__day" id="sidebar-today-day">16</span>
                <span class="sidebar-date__month" id="sidebar-today-month">July 2026</span>
            </time>
            <nav aria-label="캘린더 보기 전환" class="calendar-subnav">
                <a href="myClass.html" class="btn-pill">📖 주별</a>
                <a href="myMonthlyClass.html" class="btn-pill" aria-current="page">🗓️ 월별</a>
                <a href="myHoliday.html" class="btn-pill">🎉 휴일</a>
            </nav>
        </aside>

        <section id="month-section" aria-labelledby="month-title">
            <h1 id="month-title">🗓️ My Monthly Class</h1>
            <p>날짜를 클릭하면 해당 주의 시간표(주별 뷰)로 이동합니다.</p>

            <ul id="date" class="month-nav" aria-label="월 이동">
                <li>
                    <button type="button" id="prev-month-btn" class="carousel-btn" aria-label="이전달">◀</button>
                </li>
                <li id="current-month">2026년 7월</li>
                <li>
                    <button type="button" id="next-month-btn" class="carousel-btn" aria-label="다음달">▶</button>
                </li>
            </ul>

            <table id="sched_tbl" aria-label="월별 달력">
                <thead>
                    <tr id="day">
                        <th class="red" scope="col">일</th>
                        <th scope="col">월</th>
                        <th scope="col">화</th>
                        <th scope="col">수</th>
                        <th scope="col">목</th>
                        <th scope="col">금</th>
                        <th class="blue" scope="col">토</th>
                    </tr>
                </thead>
                <tbody id="month-grid-tbody"></tbody>
            </table>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../script/calendarUtils.js"></script>
    <script src="../script/monthlyView.js"></script>
    <script src="../script/sidebarDate.js"></script>
    <script src="../script/nav.js"></script>
    <script src="../script/footer.js"></script>
</body>

</html>
